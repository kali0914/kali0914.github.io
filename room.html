<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CometChat 测试页面</title>
    <style>
        body {
            background-color: #0a0e17;
            color: white;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h2>CometChat 小组件测试</h2>
    <p>如果右下角出现聊天图标，说明接入成功</p>

    <!-- CometChat Widget -->
    <script src="https://widget-js.cometchat.io/v3/cometchatwidget.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            CometChatWidget.init({
                "appID": "167836595192bea6c",
                "appRegion": "us",
                "authKey": "f5880b7bcc807aeca4074bd2ac1249da9b2bd310",
                "guestMode": true,
                "widgetSettings": {
                    "type": "docked",
                    "dockedPosition": "right"
                }
            }).then(response => {
                console.log("CometChat Widget 初始化成功");
            }).catch(error => {
                console.error("CometChat Widget 初始化失败", error);
                document.body.innerHTML += '<p style="color:red;">初始化失败，请检查控制台</p>';
            });
        });
    </script>
</body>
</html>
