<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>阳光森林 - 聊天测试 (Rest API Key)</title>
    <style>
        body {
            background-color: #0a0e17;
            color: white;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
        h2 { margin-bottom: 20px; }
        #status {
            margin-top: 30px;
            padding: 15px;
            background: rgba(52,152,219,0.2);
            border: 1px solid #3498db;
            border-radius: 10px;
            max-width: 90%;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h2>聊天室测试页面</h2>
    <p>如果右下角出现聊天气泡，说明匿名聊天接入成功。</p>
    <p style="color:#aaa;">下方状态提示会显示初始化结果。</p>
    <div id="status">正在加载聊天组件...</div>

    <!-- 1. 加载 CometChat Widget 核心库 -->
    <script src="https://widget-js.cometchat.io/v3/cometchatwidget.js"></script>

    <!-- 2. 初始化 Widget（游客模式 + Rest API Key） -->
    <script>
        const statusEl = document.getElementById('status');

        function initCometChat() {
            statusEl.textContent = '正在初始化 CometChat...';
            
            if (typeof CometChatWidget === 'undefined') {
                statusEl.innerHTML = '<span style="color:#e74c3c;">❌ 核心库加载失败，请检查网络。</span>';
                return;
            }

            CometChatWidget.init({
                "appID": "167836595192bea6c",
                "appRegion": "us",
                // 直接使用你提供的 Rest API Key（authKey 已不再需要）
                "restApiKey": "3c659bd876455f2879184d959dea56b5bb77fedf",
                "mode": "guest",
                "widgetSettings": {
                    "type": "docked",          // 右下角悬浮气泡
                    "dockedPosition": "right",
                    "showTitle": true,
                    "title": "匿名聊天室"
                }
            }).then(response => {
                statusEl.innerHTML = '<span style="color:#2ecc71;">✅ 初始化成功！请查看屏幕右下角。</span>';
                console.log("CometChat 初始化成功", response);
            }).catch(error => {
                statusEl.innerHTML = '<span style="color:#e74c3c;">❌ 初始化失败：' + error.message + '</span>';
                console.error("CometChat 初始化失败", error);
            });
        }

        window.addEventListener('load', initCometChat);
        if (document.readyState === 'complete') {
            initCometChat();
        }
    </script>
</body>
</html>
