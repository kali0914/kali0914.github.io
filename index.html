<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阳光森林 - 网络安全空间</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue: #3498db;
            --red: #e74c3c;
            --pink: #e84393;
            --yellow: #f1c40f;
            --orange: #e67e22;
            --green: #2ecc71;
            --purple: #9b59b6;
            --dark-bg: #0a0e17;
            --light-bg: #1a1f2e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            /* 专属光标 */
            cursor: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE2IDZWMjZNMjYgMTZINiIgc3Ryb2tlPSIjMzQ5OEQiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+CjxjaXJjbGUgY3g9IjE2IiBjeT0iMTYiIHI9IjMiIGZpbGw9IiNmZmZmZmYiLz4KPHBhdGggZD0iTTggOEwyNCAyNE0yNCA4TDggMjQiIHN0cm9rZT0iIzM0OThEIiBzdHJva2Utd2lkdGg9IjEiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgo8L3N2Zz4='), auto;
        }
        
        /* 特殊元素的光标样式 */
        a, button, .contact-btn, .circular-action-btn, .friend-link-item, .music-player-btn {
            cursor: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTggOEwyNCAyNE0yNCA4TDggMjQiIHN0cm9rZT0iI2YxYzQwZiIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KPGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iNCIgZmlsbD0iI2YxYzQwZiIvPgo8L3N2Zz4='), pointer;
        }
        
        /* 禁用文本选择 */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: var(--dark-bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-image 1s ease;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        /* 右键禁用提示框 */
        .right-click-warning {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(231, 76, 60, 0.95);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            z-index: 9999;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            animation: warningPulse 0.5s;
        }
        
        @keyframes warningPulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .right-click-warning i {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }
        
        .right-click-warning p {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        /* 动态山峰背景类 - 透明度60% */
        .bg-morning-mountain {
            background-image: linear-gradient(rgba(10, 14, 23, 0.6), rgba(10, 14, 23, 0.6)), url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') !important;
        }
        
        .bg-noon-mountain {
            background-image: linear-gradient(rgba(10, 14, 23, 0.6), rgba(10, 14, 23, 0.6)), url('https://images.unsplash.com/photo-1464278533981-50106e6176b1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') !important;
        }
        
        .bg-afternoon-mountain {
            background-image: linear-gradient(rgba(10, 14, 23, 0.6), rgba(10, 14, 23, 0.6)), url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') !important;
        }
        
        .bg-evening-mountain {
            background-image: linear-gradient(rgba(10, 14, 23, 0.6), rgba(10, 14, 23, 0.6)), url('https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') !important;
        }
        
        .bg-night-mountain {
            background-image: linear-gradient(rgba(10, 14, 23, 0.6), rgba(10, 14, 23, 0.6)), url('https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') !important;
        }
        
        /* 半透明遮罩已移除（背景直接控制透明度） */
        
        /* 主页面样式 */
        #home-page {
            display: block;  /* 默认显示主页 */
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 1s ease;
            position: relative;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .home-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 80vh;
            position: relative;
            z-index: 1;
        }
        
        .home-title {
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--blue), var(--green), var(--yellow), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
        }
        
        .home-subtitle {
            font-size: 1.8rem;
            color: #aaa;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .home-subtitle:after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
            bottom: -15px;
            left: 0;
        }
        
        .home-description {
            font-size: 1.2rem;
            color: #ddd;
            max-width: 600px;
            margin: 0 auto 60px;
            line-height: 1.8;
            padding: 20px;
            border-radius: 15px;
            background: rgba(26, 31, 46, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .home-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 80px;
        }
        
        .circular-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, var(--blue), var(--pink));
            color: white;
            border-radius: 50%;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3); }
            50% { box-shadow: 0 15px 40px rgba(52, 152, 219, 0.5); }
            100% { box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3); }
        }
        
        .circular-action-btn:before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }
        
        .circular-action-btn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 20px 50px rgba(52, 152, 219, 0.5);
        }
        
        .circular-action-btn:hover:before {
            transform: rotate(405deg);
        }
        
        .circular-action-btn span {
            position: relative;
            z-index: 1;
        }
        
        .home-quote {
            background: rgba(26, 31, 46, 0.8);
            border-radius: 20px;
            padding: 30px;
            margin: 40px auto 60px;
            max-width: 700px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 152, 219, 0.3);
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.6;
            color: #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .home-quote-author {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--blue);
            font-style: normal;
        }
        
        /* 主页页脚样式 - 无备案 */
        .home-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            font-size: 0.9rem;
        }
        
        .home-footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        /* 探索页面样式 */
        #explore-page {
            display: none;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 1s ease;
            position: relative;
        }
        
        .explore-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding-bottom: 60px;
        }
        
        .explore-header {
            padding: 40px 0 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
        }
        
        .explore-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: white;
        }
        
        .back-to-home {
            display: inline-block;
            color: var(--blue);
            text-decoration: none;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: color 0.3s;
            background: rgba(26, 31, 46, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .back-to-home:hover {
            color: var(--pink);
            border-color: var(--pink);
        }
        
        .profile-section {
            background: rgba(26, 31, 46, 0.85);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--blue), var(--red), var(--yellow));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        .profile-avatar i {
            font-size: 3rem;
            color: white;
        }
        
        .profile-info h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: white;
        }
        
        .profile-info p {
            font-size: 1.2rem;
            color: #aaa;
        }
        
        .profile-content {
            line-height: 1.8;
            color: #ddd;
            font-size: 1.1rem;
        }
        
        .profile-content p {
            margin-bottom: 20px;
        }
        
        /* 安全提示样式 */
        .security-tips-section {
            background: rgba(26, 31, 46, 0.85);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #fff;
            position: relative;
            display: inline-block;
        }
        
        .section-title:after {
            content: "";
            position: absolute;
            width: 50%;
            height: 4px;
            background: linear-gradient(90deg, var(--blue), var(--pink));
            bottom: -10px;
            left: 0;
            border-radius: 2px;
        }
        
        .security-tips-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .security-tip-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 25px;
            border-left: 5px solid var(--blue);
            transition: transform 0.3s;
        }
        
        .security-tip-card:hover {
            transform: translateY(-5px);
        }
        
        .security-tip-card h4 {
            color: var(--blue);
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .security-tip-card p {
            color: #ddd;
            line-height: 1.6;
        }
        
        /* 联系我样式 */
        .contact-section {
            background: rgba(26, 31, 46, 0.85);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .contact-buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }
        
        .contact-btn {
            display: flex;
            align-items: center;
            background: rgba(26, 31, 46, 0.9);
            border-radius: 15px;
            padding: 20px 30px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            border: 2px solid transparent;
            min-width: 280px;
            justify-content: flex-start;
            position: relative;
        }
        
        .contact-btn:hover {
            transform: translateY(-5px);
            border-color: var(--blue);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.2);
        }
        
        .contact-btn i {
            font-size: 1.8rem;
            margin-right: 15px;
            width: 40px;
        }
        
        .contact-value {
            font-size: 1rem;
            color: #aaa;
            font-weight: normal;
            margin-top: 5px;
        }
        
        /* 友情链接样式 */
        .friend-links-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .friend-links-container h3 {
            width: 100%;
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        
        .friend-link-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--blue);
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s;
            padding: 10px 20px;
            background: rgba(26, 31, 46, 0.7);
            border-radius: 10px;
            border: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .friend-link-item:hover {
            color: var(--pink);
            transform: translateY(-3px);
            border-color: var(--blue);
        }
        
        /* 探索页面页脚 - 无备案 */
        .explore-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            font-size: 0.9rem;
            text-align: center;
        }
        
        /* 音乐播放器 */
        .music-player-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 2px solid var(--blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            z-index: 1000;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
            animation: rotatePlayBtn 10s linear infinite;
            animation-play-state: paused; /* 默认暂停，播放时运行 */
        }
        
        .music-player-btn.playing {
            animation-play-state: running;
            border-color: var(--green);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.6);
        }
        
        @keyframes rotatePlayBtn {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .music-player-btn i {
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .home-title { font-size: 3rem; }
            .home-subtitle { font-size: 1.5rem; }
            .home-description { font-size: 1rem; padding: 15px; }
            .circular-action-btn { width: 120px; height: 120px; font-size: 1.2rem; }
            .explore-title { font-size: 2rem; }
            .profile-header { flex-direction: column; text-align: center; }
            .profile-avatar { width: 100px; height: 100px; }
            .profile-info h2 { font-size: 1.8rem; }
            .contact-btn { min-width: 100%; }
            .home-quote { font-size: 1.2rem; padding: 20px; }
        }
        
        @media (max-width: 480px) {
            .home-title { font-size: 2.5rem; }
            .home-subtitle { font-size: 1.2rem; }
            .circular-action-btn { width: 100px; height: 100px; font-size: 1rem; }
            .security-tips-list { grid-template-columns: 1fr; }
            .music-player-btn { width: 55px; height: 55px; font-size: 1.5rem; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>
    <!-- 右键禁用提示框 -->
    <div class="right-click-warning" id="rightClickWarning">
        <i class="fas fa-ban"></i>
        <p>本站禁止使用右键</p>
    </div>
    
    <!-- 音乐播放器 -->
    <audio id="bgMusic" src="music.MP3" preload="auto" loop></audio>
    <div class="music-player-btn" id="musicPlayerBtn" title="播放/暂停音乐">
        <i class="fas fa-music"></i>
    </div>
    
    <!-- 主页面 -->
    <div id="home-page">
        <div class="home-container">
            <h1 class="home-title" id="homeTitle">阳光森林-网络安全空间</h1>
            <p class="home-subtitle" id="homeSubtitle">守护数字世界的阳光</p>
            
            <div class="home-description" id="homeDescription">
                欢迎来到阳光森林的网络安全空间。我是一位10后网络安全爱好者，专注于渗透测试、漏洞研究、安全防御与加密技术。在这里，我将分享网络安全知识、技术实践和行业洞察，与您一同探索数字世界的边界。
            </div>
            
            <!-- 名人名言取代统计信息 -->
            <div class="home-quote">
                <i class="fas fa-quote-left" style="color: var(--blue); opacity: 0.6; margin-right: 10px;"></i>
                生活就像海洋，只有意志坚强的人才能到达彼岸。
                <i class="fas fa-quote-right" style="color: var(--blue); opacity: 0.6; margin-left: 10px;"></i>
                <div class="home-quote-author">—— 马克思</div>
            </div>
            
            <div class="home-buttons">
                <button class="circular-action-btn" id="exploreBtn">
                    <span>开始探索</span>
                </button>
            </div>
            
            <!-- 主页页脚（无备案） -->
            <div class="home-footer">
                <div class="home-footer-content">
                    <div class="home-footer-copyright" id="homeCopyright">阳光森林 © 2026 版权所有</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 探索页面 -->
    <div id="explore-page">
        <div class="explore-container">
            <div class="explore-header">
                <h1 class="explore-title" id="explorePageTitle">阳光森林 - 网络安全空间</h1>
                <a href="#" class="back-to-home" id="backToHome">
                    <i class="fas fa-arrow-left"></i> 返回主页
                </a>
            </div>
            
            <!-- 个人资料区域（动态生成） -->
            <div class="profile-section" id="profileSection"></div>
            
            <!-- 安全提示区域 -->
            <div class="security-tips-section" id="securityTipsSection">
                <h2 class="section-title" id="securityTipsTitlePage">网络安全小贴士</h2>
                <div class="security-tips-list" id="securityTipsListContainer"></div>
            </div>
            
            <!-- 联系我区域 -->
            <div class="contact-section" id="contactSection">
                <h2 class="section-title" id="contactTitle">联系我</h2>
                <div class="contact-buttons-container" id="contactButtonsContainer"></div>
            </div>
            
            <!-- 友情链接区域 -->
            <div class="friend-links-container" id="friendLinksContainer">
                <h3 id="friendTitle">友情链接</h3>
            </div>
            
            <!-- 探索页面页脚（无备案） -->
            <div class="explore-footer">
                <p id="exploreCopyright">阳光森林 © 2026 版权所有</p>
            </div>
        </div>
    </div>

    <script>
        // 默认设置 - 所有“低调的黑客”改为“阳光森林”，移除备案和管理相关
        const defaultSettings = {
            profile: {
                name: "阳光森林",
                tagline: "网络安全空间",
                avatar: "",
                description: "10后 · 网络安全爱好者\n探索数字世界的边界，守护网络空间的安全。\n专注于渗透测试、漏洞研究、安全防御与加密技术。\n在虚拟与现实之间，寻找技术的诗意。",
                additionalFields: []
            },
            contacts: [
                { 
                    name: "邮箱", 
                    value: "sunnyforest@example.com",
                    url: "mailto:sunnyforest@example.com", 
                    icon: "fas fa-envelope"
                },
                { 
                    name: "微信", 
                    value: "SunnyForest_sec",
                    url: "#", 
                    icon: "fab fa-weixin"
                }
            ],
            securityTips: [
                { 
                    title: "密码安全", 
                    content: "定期更换强密码，避免使用简单密码，推荐使用密码管理器生成和存储密码。" 
                },
                { 
                    title: "双重认证", 
                    content: "为重要账户启用双重认证（2FA），增加账户安全性。" 
                },
                { 
                    title: "软件更新", 
                    content: "保持操作系统和软件及时更新，修复安全漏洞。" 
                },
                { 
                    title: "数据备份", 
                    content: "定期备份重要数据，使用云存储和外部硬盘双重备份。" 
                },
                { 
                    title: "警惕钓鱼", 
                    content: "不点击可疑链接，不下载不明附件，谨慎对待索要个人信息的要求。" 
                }
            ],
            friendLinks: [
                { name: "一位苹果软件开发者", url: "https://iamadman.com" }
            ],
            homePage: {
                title: "阳光森林-网络安全空间",
                subtitle: "守护数字世界的阳光",
                description: "欢迎来到阳光森林的网络安全空间。我是一位10后网络安全爱好者，专注于渗透测试、漏洞研究、安全防御与加密技术。在这里，我将分享网络安全知识、技术实践和行业洞察，与您一同探索数字世界的边界。"
            },
            system: {
                copyright: "阳光森林 © 2026 版权所有",
                rightClickMessage: "本站禁止使用右键"
            }
        };

        // 当前设置 - 直接使用默认，无本地存储
        let currentSettings = {...defaultSettings};
        
        // DOM元素
        const homePage = document.getElementById('home-page');
        const explorePage = document.getElementById('explore-page');
        const exploreBtn = document.getElementById('exploreBtn');
        const backToHome = document.getElementById('backToHome');
        const rightClickWarning = document.getElementById('rightClickWarning');
        
        // 音乐播放器元素
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicPlayerBtn');
        let isMusicPlaying = false; // 实际状态由audio的play/pause决定
        
        // 页面元素
        const profileSection = document.getElementById('profileSection');
        const securityTipsListContainer = document.getElementById('securityTipsListContainer');
        const contactButtonsContainer = document.getElementById('contactButtonsContainer');
        const friendLinksContainer = document.getElementById('friendLinksContainer');
        
        // 页脚和版权信息元素
        const homeTitle = document.getElementById('homeTitle');
        const homeSubtitle = document.getElementById('homeSubtitle');
        const homeDescription = document.getElementById('homeDescription');
        const homeCopyright = document.getElementById('homeCopyright');
        const exploreCopyright = document.getElementById('exploreCopyright');
        const explorePageTitle = document.getElementById('explorePageTitle');
        
        // 初始化
        function init() {
            // 设置基于时间的山峰背景
            setTimeBasedMountainBackground();
            
            // 设置右键禁用
            setupRightClickProtection();
            
            // 更新所有页面内容
            updateAllPages();
            
            // 初始化音乐播放器
            initMusicPlayer();
        }
        
        // 设置基于时间的山峰背景
        function setTimeBasedMountainBackground() {
            const now = new Date();
            const hour = now.getHours();
            let bgClass = '';
            
            if (hour >= 5 && hour < 9) {
                bgClass = 'bg-morning-mountain';
            } else if (hour >= 9 && hour < 12) {
                bgClass = 'bg-noon-mountain';
            } else if (hour >= 12 && hour < 17) {
                bgClass = 'bg-afternoon-mountain';
            } else if (hour >= 17 && hour < 20) {
                bgClass = 'bg-evening-mountain';
            } else {
                bgClass = 'bg-night-mountain';
            }
            
            document.body.className = bgClass;
            setTimeout(setTimeBasedMountainBackground, 3600000);
        }
        
        // 设置右键禁用保护
        function setupRightClickProtection() {
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                showRightClickWarning();
                return false;
            });
            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
                return false;
            });
            document.addEventListener('dragstart', function(e) {
                e.preventDefault();
                return false;
            });
            document.addEventListener('copy', function(e) {
                e.preventDefault();
                return false;
            });
            document.addEventListener('cut', function(e) {
                e.preventDefault();
                return false;
            });
            document.addEventListener('paste', function(e) {
                e.preventDefault();
                return false;
            });
        }
        
        function showRightClickWarning() {
            rightClickWarning.style.display = 'block';
            const warningMessage = document.querySelector('#rightClickWarning p');
            if (warningMessage) {
                warningMessage.textContent = currentSettings.system.rightClickMessage;
            }
            setTimeout(function() {
                rightClickWarning.style.display = 'none';
            }, 3000);
        }
        
        // 更新所有页面内容
        function updateAllPages() {
            updateHomePage();
            updateExplorePage();
        }
        
        function updateHomePage() {
            homeTitle.textContent = currentSettings.homePage.title;
            homeSubtitle.textContent = currentSettings.homePage.subtitle;
            homeDescription.textContent = currentSettings.homePage.description;
            homeCopyright.textContent = currentSettings.system.copyright;
        }
        
        function updateExplorePage() {
            explorePageTitle.textContent = currentSettings.profile.name + " - " + currentSettings.profile.tagline;
            updateProfileSection();
            updateSecurityTipsSection();
            updateContactSection();
            updateFriendLinksSection();
            exploreCopyright.textContent = currentSettings.system.copyright;
        }
        
        function updateProfileSection() {
            profileSection.innerHTML = '';
            const profileHTML = `
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">
                        <img id="profileAvatarImg" src="${currentSettings.profile.avatar}" alt="头像">
                        <i class="fas fa-user-secret"></i>
                    </div>
                    <div class="profile-info">
                        <h2>${currentSettings.profile.name}</h2>
                        <p>${currentSettings.profile.tagline}</p>
                    </div>
                </div>
                <div class="profile-content">
                    ${formatDescription(currentSettings.profile.description)}
                    ${generateAdditionalFieldsHTML()}
                </div>
            `;
            profileSection.innerHTML = profileHTML;
            
            const profileAvatarImg = document.getElementById('profileAvatarImg');
            const profileAvatarIcon = document.getElementById('profileAvatar').querySelector('i');
            if (currentSettings.profile.avatar && currentSettings.profile.avatar.trim() !== '') {
                profileAvatarImg.style.display = 'block';
                profileAvatarIcon.style.display = 'none';
            } else {
                profileAvatarImg.style.display = 'none';
                profileAvatarIcon.style.display = 'block';
            }
        }
        
        function formatDescription(text) {
            if (!text) return '';
            const lines = text.split('\n');
            let html = '';
            lines.forEach(line => {
                if (line.trim() !== '') {
                    html += `<p>${line}</p>`;
                }
            });
            return html;
        }
        
        function generateAdditionalFieldsHTML() {
            if (!currentSettings.profile.additionalFields || currentSettings.profile.additionalFields.length === 0) {
                return '';
            }
            let html = '';
            currentSettings.profile.additionalFields.forEach(field => {
                html += `<p><strong>${field.name}:</strong> ${field.value}</p>`;
            });
            return html;
        }
        
        function updateSecurityTipsSection() {
            securityTipsListContainer.innerHTML = '';
            if (!currentSettings.securityTips || currentSettings.securityTips.length === 0) {
                securityTipsListContainer.innerHTML = '<p style="color: #aaa; text-align: center;">暂无安全提示</p>';
                return;
            }
            currentSettings.securityTips.forEach(tip => {
                const tipCard = document.createElement('div');
                tipCard.className = 'security-tip-card';
                tipCard.innerHTML = `
                    <h4><i class="fas fa-shield-alt"></i> ${tip.title}</h4>
                    <p>${tip.content}</p>
                `;
                securityTipsListContainer.appendChild(tipCard);
            });
        }
        
        function updateContactSection() {
            contactButtonsContainer.innerHTML = '';
            if (!currentSettings.contacts || currentSettings.contacts.length === 0) {
                contactButtonsContainer.innerHTML = '<p style="color: #aaa; text-align: center;">暂无联系信息</p>';
                return;
            }
            currentSettings.contacts.forEach(contact => {
                const contactBtn = document.createElement('a');
                contactBtn.href = contact.url === '#' ? 'javascript:void(0)' : contact.url;
                contactBtn.className = 'contact-btn';
                contactBtn.title = contact.name;
                
                if (contact.url.startsWith('mailto:')) {
                    contactBtn.target = '_self';
                } else if (contact.url !== '#') {
                    contactBtn.target = '_blank';
                }
                
                if (contact.url === '#') {
                    contactBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('链接尚未配置');
                    });
                }
                
                const icon = document.createElement('i');
                if (contact.icon.startsWith('http') || contact.icon.startsWith('data:')) {
                    const img = document.createElement('img');
                    img.src = contact.icon;
                    img.alt = contact.name;
                    img.style.width = '1.8rem';
                    img.style.height = '1.8rem';
                    icon.appendChild(img);
                } else {
                    icon.className = contact.icon;
                }
                
                contactBtn.appendChild(icon);
                
                const contentDiv = document.createElement('div');
                const nameDiv = document.createElement('div');
                nameDiv.textContent = contact.name;
                contentDiv.appendChild(nameDiv);
                
                const valueDiv = document.createElement('div');
                valueDiv.className = 'contact-value';
                valueDiv.textContent = contact.value || '未配置';
                contentDiv.appendChild(valueDiv);
                
                contactBtn.appendChild(contentDiv);
                contactButtonsContainer.appendChild(contactBtn);
            });
        }
        
        function updateFriendLinksSection() {
            const container = friendLinksContainer;
            const title = container.querySelector('h3');
            while (container.children.length > 1) {
                container.removeChild(container.lastChild);
            }
            if (!currentSettings.friendLinks || currentSettings.friendLinks.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.style.color = '#aaa';
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.width = '100%';
                emptyMsg.textContent = '暂无友情链接';
                container.appendChild(emptyMsg);
                return;
            }
            currentSettings.friendLinks.forEach(friend => {
                const friendLink = document.createElement('a');
                friendLink.href = friend.url;
                friendLink.className = 'friend-link-item';
                friendLink.target = '_blank';
                friendLink.rel = 'noopener noreferrer';
                
                const icon = document.createElement('i');
                icon.className = 'fas fa-external-link-alt';
                friendLink.appendChild(icon);
                
                const text = document.createElement('span');
                text.textContent = friend.name;
                friendLink.appendChild(text);
                
                container.appendChild(friendLink);
            });
        }
        
        // 音乐播放器初始化
        function initMusicPlayer() {
            // 尝试自动播放
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicBtn.classList.add('playing');
            }).catch(err => {
                console.log('自动播放失败，等待用户点击', err);
                isMusicPlaying = false;
                musicBtn.classList.remove('playing');
            });
            
            musicBtn.addEventListener('click', toggleMusic);
            
            // 监听播放结束（loop下不会结束，但以防万一）
            bgMusic.addEventListener('pause', () => {
                isMusicPlaying = false;
                musicBtn.classList.remove('playing');
            });
            
            bgMusic.addEventListener('play', () => {
                isMusicPlaying = true;
                musicBtn.classList.add('playing');
            });
        }
        
        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicBtn.classList.add('playing');
                }).catch(e => console.log('播放失败', e));
            } else {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
            }
        }
        
        // 事件监听
        exploreBtn.addEventListener('click', function() {
            homePage.style.display = 'none';
            explorePage.style.display = 'block';
        });
        
        backToHome.addEventListener('click', function(e) {
            e.preventDefault();
            explorePage.style.display = 'none';
            homePage.style.display = 'block';
        });
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
